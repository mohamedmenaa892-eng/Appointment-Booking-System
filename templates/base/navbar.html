<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Booking System{% endblock %}</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

/* ===== COLORS ===== */

:root {
    --primary-color: #0d6efd;   /* أزرق */
    --light-bg: #ffffff;        /* أبيض */
}

/* ===== BODY ===== */

body {
    background: var(--light-bg);
    font-family: Arial, sans-serif;
}

/* ===== NAVBAR ===== */

.navbar {
    background: var(--primary-color);
}

.navbar-brand,
.nav-link {
    color: white !important;
    font-weight: 500;
}

.nav-link:hover {
    opacity: 0.8;
}

/* ===== BUTTONS ===== */

.btn-primary {
    background: var(--primary-color);
    border: none;
}

.btn-primary:hover {
    opacity: 0.9;
}

/* ===== CARD ===== */

.card {
    border: none;
    border-radius: 12px;
}

/* ===== FOOTER ===== */

footer {
    background: #f8f9fa;
    margin-top: 50px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
📅 Booking
</a>

<button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{% url 'services_view' %}">Home</a>
</li>

{% if request.user.is_authenticated %}
    <li class="nav-item">
        <a class="nav-link" href="{% url 'user_auth:logout' %}">Logout</a>
    </li>
{% else %}
    <li class="nav-item">
        <a class="nav-link" href="{% url 'user_auth:login' %}">Login</a>
    </li>
{% endif %}
</ul>

</div>

</div>

</nav>

<!-- CONTENT -->

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

<!-- FOOTER -->

<footer class="text-center py-3">

<p class="mb-0 text-muted">
© 2026 Booking System
</p>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
